name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t webapp:${{ github.sha }} ./webapp
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: webapp:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  semgrep-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install and run GitLeaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          ./gitleaks detect --source . -v || true

  sbom-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t webapp:${{ github.sha }} ./webapp
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: webapp:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ github.sha }}.json

zap-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t webapp:${{ github.sha }} ./webapp
      - name: Start webapp
        run: docker run -d -p 5000:5000 webapp:${{ github.sha }}
      - name: Wait for webapp
        run: sleep 5
      - name: ZAP Baseline Scan
        run: |
          chmod 777 ${{ github.workspace }}
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -r zap-report.html \
            -J zap-report.json || true
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
        if: always()
